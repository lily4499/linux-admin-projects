apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-developer
  namespace: dev
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - secrets
      - deployments
      - replicasets
      - jobs
      - cronjobs
    verbs: ["get","list","watch","create","update","patch","delete"]
